# Firebase App Hosting — https://firebase.google.com/docs/app-hosting/configure
# Set secrets: firebase apphosting:secrets:set SECRET_NAME

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: DATABASE_URL
    secret: DATABASE_URL
  - variable: DIRECT_URL
    secret: DIRECT_URL
  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET
  - variable: NEXTAUTH_URL
    secret: NEXTAUTH_URL
  - variable: NEXT_PUBLIC_SUPABASE_URL
    secret: NEXT_PUBLIC_SUPABASE_URL
  - variable: SUPABASE_SECRET_KEY
    secret: SUPABASE_SECRET_KEY
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secret: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
  - variable: STRIPE_PRICE_PREMIER_MONTHLY
    secret: STRIPE_PRICE_PREMIER_MONTHLY
  - variable: STRIPE_PRICE_PREMIER_ANNUAL
    secret: STRIPE_PRICE_PREMIER_ANNUAL
  - variable: SMTP_HOST
    secret: SMTP_HOST
  - variable: SMTP_PORT
    secret: SMTP_PORT
  - variable: SMTP_SECURE
    secret: SMTP_SECURE
  - variable: SMTP_USER
    secret: SMTP_USER
  - variable: SMTP_PASS
    secret: SMTP_PASS
  - variable: EMAIL_FROM
    secret: EMAIL_FROM
